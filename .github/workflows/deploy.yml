name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存パッケージインストール
        run: npm install

      - name: index.jsonを自動生成
        run: node scripts/generate-index.cjs

      - name: ビルド
        run: npm run build

      - name: GitHub Pagesの設定
        uses: actions/configure-pages@v4

      - name: ビルド成果物をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: GitHub Pagesにデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
